const STEPS = [
  {id:'name',type:'text',lbl:'Paso 1 de 7',q:'¿Cómo se llama tu negocio?',sub:'El nombre tal como aparece (o te gustaría que apareciera) en Google y redes sociales.',ph:'Nombre del negocio',key:'name'},
  {id:'type',type:'owother',lbl:'Paso 2 de 7',q:'¿Qué tipo de negocio tienes?',sub:'Elige la que mejor describe tu espacio.',key:'type',opts:[{l:'Bar / Cafetería',s:'Café, bar de barrio, vermutería...'},{l:'Restaurante',s:'Menú del día, carta, tapas...'},{l:'Tienda local',s:'Producto, artesanía, moda...'},{l:'Otro',s:'Estudio, espacio cultural, servicio...'}]},
  {id:'time',type:'opts',lbl:'Paso 3 de 7',q:'¿Cuánto tiempo llevas abierto?',key:'time',opts:[{l:'Menos de 1 año',s:'Empezando a establecerse'},{l:'1–3 años',s:'Creciendo y consolidando'},{l:'3–10 años',s:'Estable, listo para crecer'},{l:'Más de 10 años',s:'Arraigado en el barrio'}]},
  {id:'goals',type:'multi',lbl:'Paso 4 de 7',q:'¿Qué te gustaría mejorar?',sub:'Cuéntanos hacia dónde quieres crecer. Puedes marcar todo lo que resuene.',key:'goals',opts:[{l:'Aparecer más en Google',s:'Quiero que me encuentren fácilmente en Maps, búsquedas y reseñas'},{l:'Crecer en redes sociales',s:'Quiero una presencia activa y coherente en Instagram y otras redes'},{l:'Tener una web',s:'Quiero un lugar online donde la gente pueda conocerme, ver mi oferta y reservar'},{l:'Mejorar la experiencia del local',s:'Quiero que el ambiente, la iluminación y los detalles transmitan más'},{l:'Organizar eventos o activar comunidad',s:'Quiero conectar con mi barrio y generar momentos especiales'},{l:'Definir mi identidad de marca',s:'Quiero que mi imagen, nombre y comunicación tengan coherencia y carácter'},{l:'No sé por dónde empezar',s:'Quiero una visión externa que me ayude a priorizar'}]},

let cur=0, ans={}, mul={};
const pct=()=>Math.round((cur/STEPS.length)*100);

function mkBtn(l,s,sel,fn){
  return '<button onclick="'+fn+'" style="display:flex;align-items:flex-start;gap:10px;width:100%;padding:13px 14px;background:'+(sel?'#b93926':'#fdf6ee')+';border:1.5px solid '+(sel?'#b93926':'#c9a96e')+';border-radius:6px;cursor:pointer;font-family:Barlow,sans-serif;font-size:14px;color:'+(sel?'#fdf6ee':'#3d2b1f')+';text-align:left;line-height:1.4;box-sizing:border-box;">'

  +'</button>';
}

function render(){
  const qb=document.getElementById('qb');
  qb.innerHTML='';
  if(cur>=STEPS.length){renderResult(qb);return;}
  const st=STEPS[cur];
  const w=document.createElement('div');
  w.className='fade';
  let h='<div class="pbar"><div class="pfill" style="width:'+pct()+'%"></div></div>'
    +'<div class="slbl">'+st.lbl+'</div>'
    +'<div class="qtext">'+st.q+'</div>';
  if(st.sub) h+='<div class="qsub">'+st.sub+'</div>';

  if(st.type==='text'){
    h+='<div style="margin-bottom:1.4rem"><input id="finp" type="text" placeholder="'+(st.ph||'')+'" value="'+(ans[st.key]||'')+'" style="width:100%;background:#fdf6ee;border:1.5px solid #c9a96e;border-radius:6px;padding:12px 14px;font-family:Barlow,sans-serif;font-size:15px;color:#3d2b1f;height:48px;box-sizing:border-box;outline:none;"></div>';
  }
  if(st.type==='opts'){
    h+='<div class="ogrid">';
    st.opts.forEach(function(o){h+=mkBtn(o.l,o.s,ans[st.key]===o.l,"so('"+st.key+"','"+o.l.replace(/'/g,"\\'")+"')");});
    h+='</div>';
  }
  if(st.type==='owother'){
    var cv=ans[st.key]||'';
    var fixed=['Bar / Cafetería','Restaurante','Tienda local','Otro'];
    var isO=cv==='Otro'||(cv&&fixed.indexOf(cv)===-1);
    h+='<div class="ogrid">';
    st.opts.forEach(function(o){var sel=o.l==='Otro'?isO:cv===o.l;h+=mkBtn(o.l,o.s,sel,"sow('"+st.key+"','"+o.l.replace(/'/g,"\\'")+"')");});
    h+='</div><div id="owrap" style="display:'+(isO?'block':'none')+';margin-top:-4px;margin-bottom:1.2rem"><input id="oinp" type="text" placeholder="¿Qué tipo de negocio tienes?" value="'+(isO&&cv!=='Otro'?cv:'')+'" style="width:100%;background:#fdf6ee;border:1.5px solid #c9a96e;border-radius:6px;padding:12px 14px;font-family:Barlow,sans-serif;font-size:15px;color:#3d2b1f;height:48px;box-sizing:border-box;outline:none;"></div>';
  }
  if(st.type==='multi'){
    if(!mul[st.key])mul[st.key]=ans[st.key]||[];
    h+='<div class="ogrid solo">';
    st.opts.forEach(function(o){h+=mkBtn(o.l,o.s,mul[st.key].indexOf(o.l)>-1,"tm('"+st.key+"','"+o.l.replace(/'/g,"\\'")+"')");});
    h+='</div><p class="mhint">Selecciona todas las que apliquen</p>';
  }
  if(st.type==='contact'){
    var c=ans.contact||{};
    h+='<div class="fgrp"><div class="frow">'
      +'<div class="fwrap"><div class="flbl">Nombre</div><input id="cn" type="text" placeholder="Tu nombre" value="'+(c.cname||'')+'" style="width:100%;background:#fdf6ee;border:1.5px solid #c9a96e;border-radius:6px;padding:12px 14px;font-family:Barlow,sans-serif;font-size:14px;color:#3d2b1f;height:46px;box-sizing:border-box;outline:none;"></div>'
      +'<div class="fwrap"><div class="flbl">Email</div><input id="ce" type="email" placeholder="hola@negocio.com" value="'+(c.email||'')+'" style="width:100%;background:#fdf6ee;border:1.5px solid #c9a96e;border-radius:6px;padding:12px 14px;font-family:Barlow,sans-serif;font-size:14px;color:#3d2b1f;height:46px;box-sizing:border-box;outline:none;"></div>'
      +'</div><div class="fwrap"><div class="flbl">Teléfono <span class="opttag">(opcional)</span></div>'
      +'<div style="display:flex;align-items:center;background:#fdf6ee;border:1.5px solid #c9a96e;border-radius:6px;overflow:hidden;">'
      +'<span style="padding:0 8px 0 14px;font-family:Barlow,sans-serif;font-size:14px;color:#9a7a50;white-space:nowrap;line-height:44px;flex-shrink:0">+34</span>'
      +'<input id="cp" type="tel" placeholder="600 000 000" value="'+(c.phone||'')+'" style="flex:1;background:transparent;border:none;padding:12px 8px;font-family:Barlow,sans-serif;font-size:14px;color:#3d2b1f;height:44px;box-sizing:border-box;outline:none;">'
      +'</div></div></div>';
  }
  if(st.type==='final'){
    var f=ans.final||{};
    h+='<div class="fgrp">'
      +'<div class="fwrap"><div class="flbl">Instagram <span class="opttag">(opcional)</span></div>'
      +'<div style="display:flex;align-items:center;background:#fdf6ee;border:1.5px solid #c9a96e;border-radius:6px;overflow:hidden;">'
      +'<span style="padding:0 8px 0 14px;font-family:Barlow,sans-serif;font-size:14px;color:#9a7a50;white-space:nowrap;line-height:44px;flex-shrink:0">@</span>'
      +'<input id="fig" type="text" placeholder="nombredelnegocio" value="'+(f.instagram||'')+'" style="flex:1;background:transparent;border:none;padding:12px 8px;font-family:Barlow,sans-serif;font-size:14px;color:#3d2b1f;height:44px;box-sizing:border-box;outline:none;"></div></div>'
      +'<div class="fwrap"><div class="flbl">Web <span class="opttag">(opcional)</span></div>'
      +'<div style="display:flex;align-items:center;background:#fdf6ee;border:1.5px solid #c9a96e;border-radius:6px;overflow:hidden;">'
      +'<span style="padding:0 8px 0 14px;font-family:Barlow,sans-serif;font-size:14px;color:#9a7a50;white-space:nowrap;line-height:44px;flex-shrink:0">https://</span>'
      +'<input id="fwb" type="text" placeholder="www.tunegocio.com" value="'+(f.website||'')+'" style="flex:1;background:transparent;border:none;padding:12px 8px;font-family:Barlow,sans-serif;font-size:14px;color:#3d2b1f;height:44px;box-sizing:border-box;outline:none;"></div></div>'
      +'<div class="fwrap"><div class="flbl">Google Maps u otras redes <span class="opttag">(opcional)</span></div>'
      +'<input id="fot" type="text" placeholder="Link de Google Maps, TripAdvisor..." value="'+(f.other||'')+'" style="width:100%;background:#fdf6ee;border:1.5px solid #c9a96e;border-radius:6px;padding:12px 14px;font-family:Barlow,sans-serif;font-size:14px;color:#3d2b1f;height:46px;box-sizing:border-box;outline:none;"></div>'
      +'<div class="fwrap"><div class="flbl">¿Algo más que quieras contarnos? <span class="opttag">(opcional)</span></div>'
      +'<textarea id="fnt" placeholder="Contexto, urgencias, preguntas..." style="width:100%;background:#fdf6ee;border:1.5px solid #c9a96e;border-radius:6px;padding:12px 14px;font-family:Barlow,sans-serif;font-size:14px;color:#3d2b1f;min-height:90px;box-sizing:border-box;outline:none;resize:vertical;line-height:1.6">'+(f.notes||'')+'</textarea></div>'
      +'</div>';
  }

  h+='<hr class="drule"><div class="navrow">'
    +'<div>'+(cur>0?'<button onclick="prev()" style="background:#fdf6ee;color:#7a6040;border:1.5px solid #c9a96e;border-radius:6px;padding:12px 20px;font-family:Barlow,sans-serif;font-size:14px;font-weight:500;cursor:pointer;">← Volver</button>':'<span></span>')+'</div>'
    +'<button id="nxt" onclick="nxt()" disabled style="background:#b93926;color:#fdf6ee;border:none;border-radius:6px;padding:13px 28px;font-family:\'Barlow Condensed\',sans-serif;font-size:17px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;opacity:0.35;">'+(cur===STEPS.length-1?'Enviar':'Continuar →')+'</button>'
    +'</div>';

  w.innerHTML=h;
  qb.appendChild(w);

  var nxtBtn=document.getElementById('nxt');
  function upd(){var ok=chk();nxtBtn.disabled=!ok;nxtBtn.style.opacity=ok?'1':'0.35';nxtBtn.style.cursor=ok?'pointer':'default';}

  if(st.type==='text'){var fi=document.getElementById('finp');if(fi){fi.addEventListener('input',upd);fi.addEventListener('keydown',function(e){if(e.key==='Enter'&&!nxtBtn.disabled)nxt();});}}
  if(st.type==='owother'){var oi=document.getElementById('oinp');if(oi)oi.addEventListener('input',upd);}
  if(st.type==='contact'){['cn','ce','cp'].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',upd);});}
  if(st.type==='final'){['fig','fwb','fot','fnt'].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',upd);});}
  upd();
}

function chk(){
  var st=STEPS[cur];
  if(st.type==='text'){var f=document.getElementById('finp');return f&&f.value.trim().length>0;}
  if(st.type==='owother'){var v=ans[st.key];if(v==='Otro'){var oi=document.getElementById('oinp');return oi&&oi.value.trim().length>0;}return!!v;}
  if(st.type==='multi')return(mul[st.key]||[]).length>0;
  if(st.type==='contact'){var n=document.getElementById('cn'),e=document.getElementById('ce');return n&&n.value.trim().length>0&&e&&e.value.indexOf('@')>-1;}
  if(st.type==='final')return true;
  return!!ans[st.key];
}

function so(key,val){ans[key]=val;render();}
function sow(key,val){
  var wrap=document.getElementById('owrap'),inp=document.getElementById('oinp');
  if(val==='Otro'){ans[key]='Otro';if(wrap)wrap.style.display='block';if(inp){inp.value='';setTimeout(function(){inp.focus();},50);}}
  else{ans[key]=val;if(wrap)wrap.style.display='none';if(inp)inp.value='';}
  render();
}
function tm(key,val){
  if(!mul[key])mul[key]=[];
  var i=mul[key].indexOf(val);
  if(i>-1)mul[key].splice(i,1);else mul[key].push(val);
  ans[key]=mul[key].slice();render();
}

function save(){
  var st=STEPS[cur];
  if(st.type==='text'){var f=document.getElementById('finp');if(f)ans[st.key]=f.value.trim();}
  if(st.type==='owother'){var oi=document.getElementById('oinp');if(oi&&oi.value.trim())ans[st.key]=oi.value.trim();}
  if(st.type==='contact'){ans.contact={cname:document.getElementById('cn').value.trim(),email:document.getElementById('ce').value.trim(),phone:(document.getElementById('cp')||{value:''}).value.trim()};}
  if(st.type==='final'){ans.final={instagram:(document.getElementById('fig')||{value:''}).value.trim(),website:(document.getElementById('fwb')||{value:''}).value.trim(),other:(document.getElementById('fot')||{value:''}).value.trim(),notes:(document.getElementById('fnt')||{value:''}).value.trim()};}
}

function nxt(){save();cur++;render();window.scrollTo({top:0,behavior:'smooth'});}
function prev(){save();cur--;render();window.scrollTo({top:0,behavior:'smooth'});}

function submitToFormspree(){
  var c=ans.contact||{},f=ans.final||{};
  var goals=Array.isArray(ans.goals)?ans.goals.join(', '):'—';
  var payload={
    '_subject':'Nueva solicitud de Barris Vius — '+(ans.name||'Sin nombre'),
    'Negocio':ans.name||'—',
    'Tipo de negocio':ans.type||'—',
    'Tiempo abierto':ans.time||'—',
    'Quiero mejorar':goals,
    'Presupuesto':ans.budget||'—',
    'Nombre de contacto':c.cname||'—',
    'Email':c.email||'—',
    'Teléfono':c.phone||'—',
    'Instagram':f.instagram?'@'+f.instagram:'—',
    'Web':f.website?'https://'+f.website:'—',
    'Otros links':f.other||'—',
    'Notas':f.notes||'—'
  };
  fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload)});
}

function renderResult(qb){
  var goals=Array.isArray(ans.goals)?ans.goals.join(', '):'—';
  var c=ans.contact||{},f=ans.final||{};
  var ct=[c.cname,c.email,c.phone].filter(Boolean).join(' · ');
  var lk=[f.instagram?'@'+f.instagram:'',f.website?'https://'+f.website:'',f.other||''].filter(Boolean);
  var el=document.createElement('div');
  el.className='rscreen fade';
  el.innerHTML='<div class="rictitle">✦ Barris Vius</div>'
    +'<div class="rtitle">Gracias,<br>'+(c.cname||ans.name||'por compartir')+'.</div>'
    +'<p class="rsub">Hemos recibido todo. Nos pondremos en contacto contigo pronto para hablar sobre cómo podemos trabajar juntos.</p>'
    +'<hr class="drule">'
    +'<div class="scard">'
    +'<div class="srow"><span class="slb">Negocio</span><span class="sval">'+(ans.name||'—')+'</span></div>'
    +'<div class="srow"><span class="slb">Tipo</span><span class="sval">'+(ans.type||'—')+'</span></div>'
    +'<div class="srow"><span class="slb">Tiempo abierto</span><span class="sval">'+(ans.time||'—')+'</span></div>'
    +'<div class="srow"><span class="slb">Quiero mejorar</span><span class="sval" style="font-weight:400">'+goals+'</span></div>'
    +'<div class="srow"><span class="slb">Presupuesto</span><span class="sval">'+(ans.budget||'—')+'</span></div>'
    +'<div class="srow"><span class="slb">Contacto</span><span class="sval" style="font-weight:400">'+(ct||'—')+'</span></div>'
    +(lk.length?'<div class="srow"><span class="slb">Links</span><span class="sval" style="font-weight:400">'+lk.join('<br>')+'</span></div>':'')
    +(f.notes?'<div class="srow"><span class="slb">Notas</span><span class="sval" style="font-weight:400;font-style:italic">'+f.notes+'</span></div>':'')
    +'</div>'
    +'<p class="note">¿Algo que cambiar? <span style="text-decoration:underline;cursor:pointer;color:#7a6040" onclick="restart()">Volver al inicio</span></p>';
  qb.appendChild(el);
  submitToFormspree();
}

function restart(){cur=0;ans={};mul={};render();}
render();
</script>
</body>
</html>
